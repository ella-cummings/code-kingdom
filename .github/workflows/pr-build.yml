name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code-kingdom/package-lock.json

      - name: Install dependencies
        working-directory: code-kingdom
        run: npm ci

      - name: Build
        working-directory: code-kingdom
        run: npm run build
