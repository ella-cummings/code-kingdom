name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code-kingdom/package-lock.json

      - name: Install dependencies
        working-directory: code-kingdom
        run: npm ci

      - name: Set base path for GitHub Pages
        working-directory: code-kingdom
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('vite.config.js', 'utf8');
            fs.writeFileSync('vite.config.js', content.replace(\"base: './'\", \"base: '/code-kingdom/'\"));
          "

      - name: Build
        working-directory: code-kingdom
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: code-kingdom/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
